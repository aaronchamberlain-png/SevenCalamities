<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Initiative Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background:#121212; color:#eee; font-family: Georgia, serif; }
    .container { max-width: 700px; margin-top: 40px; }
    .title { color:#d4af37; text-align:center; margin-bottom:20px; }
    .list-group-item { background:#1f1f1f; color:#fff; border:none; }
    button { margin-top:10px; }
  </style>
</head>
<body>

<div class="container">
  <h2 class="title">Initiative Tracker</h2>

  <div class="row g-2">
    <div class="col-md-6">
      <input type="text" id="name" class="form-control" placeholder="Character Name">
    </div>
    <div class="col-md-3">
      <input type="number" id="initiative" class="form-control" placeholder="Initiative">
    </div>
    <div class="col-md-3 d-grid">
      <button class="btn btn-warning" onclick="addCharacter()">Add</button>
    </div>
  </div>

  <div class="d-grid">
    <button class="btn btn-success" onclick="updateOrder()">Update Order</button>
  </div>

  <ul class="list-group mt-4" id="initiativeList"></ul>
</div>

<script>
let characters = [];

function addCharacter() {
  const nameInput = document.getElementById('name');
  const initInput = document.getElementById('initiative');

  const name = nameInput.value.trim();
  const initiative = parseInt(initInput.value);

  if (!name || isNaN(initiative)) {
    alert('Please enter valid name and initiative');
    return;
  }

  characters.push({ name, initiative });

  nameInput.value = '';
  initInput.value = '';
}

function updateOrder() {
  characters.sort((a, b) => b.initiative - a.initiative);
  renderList();
}

function renderList() {
  const list = document.getElementById('initiativeList');
  list.innerHTML = '';

  characters.forEach((char, index) => {
    const item = document.createElement('li');
    item.className = 'list-group-item';
    item.innerText = `${index + 1}. ${char.name} (Init: ${char.initiative})`;
    list.appendChild(item);
  });
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
