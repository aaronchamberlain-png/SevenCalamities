<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artifact</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

	<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Banner -->
<img src="images/banner.png" alt="Banner" class="banner">

<!-- Navigation Bar -->
<div id="navbar"></div>

<!-- Content -->
<div class="container content">

    <!-- Character Header -->
    <div class="text-center">
        <h1 class="section-title">Artifact Name</h1>
        <p class="small-text"><em>Type | Sentience | Alignment</em></p>
    </div>

    <!-- Three Column Layout -->
    <div class="row mt-4">

        <!-- Left Column: Image -->
        <div class="col-md-4">
            <div class="card p-3">
                <img src="artifact.jpg" class="img-fluid rounded" alt="Character Image">
            </div>
        </div>

        <!-- Middle Column: Stats & Details -->
        <div class="col-md-4">
            <div class="card p-3 mb-3">
                <h5 class="section-title">Stats</h5>
                <ul class="small-text">
                    <li>Power:</li>
                    <li>Power:</li>
                    <li>Power:</li>
                </ul>
            </div>
        </div>

        <!-- Right Column: Story -->
        <div class="col-md-4">
            <div class="card p-3 mb-3">
                <h4 class="section-title">Description</h4>
                <p class="small-text">Write the artifacts's description here...</p>
            </div>

            <div class="card p-3">
                <h4 class="section-title">History</h4>
                <p class="small-text">Write the artifacts history here...</p>
            </div>
        </div>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
fetch("navbar.html")
  .then(response => response.text())
  .then(data => {
    document.getElementById("navbar").innerHTML = data;
  });
</script>
</body>
</html>
