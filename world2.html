<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Interactive Impiltur Map</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    color: #eee;
    padding-bottom: 50px;
}

header {
    text-align: center;
    padding: 20px;
}

.map-container {
    width: 90%;
    margin: 0 auto 50px auto;
    position: relative;
}

svg {
    width: 100%;
    height: auto;
    display: block;
    margin: 0 auto;

    border-radius: 12px;

    /* IMPORTANT: prevents clipping of rounded corners */
    overflow: hidden;
}

/* Background image INSIDE SVG is now handled by <image>, not CSS */

.region {
    cursor: pointer;
    transition: 0.2s ease-in-out;
    filter: grayscale(30%);
    opacity: 0.75;
}

.region:hover {
    filter: grayscale(0%) brightness(1.2);
    opacity: 1;
    filter: drop-shadow(0 0 10px cyan);
}

.popup {
    position: absolute;
    background: rgba(20,20,20,0.95);
    border: 1px solid #555;
    padding: 12px;
    border-radius: 8px;
    width: 260px;
    display: none;
    pointer-events: none;
    z-index: 1000;
}

.popup h3 {
    margin-top: 0;
}

.close-btn {
    float: right;
    cursor: pointer;
    color: #aaa;
}

</style>
	<link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Banner Image -->
    <img src="images/banner.png" alt="The Seven Calamities Banner" class="banner">

<!-- Navigation Bar -->
<div id="navbar"></div>

<header>
    <h1>Interactive Faerûn Map</h1>
</header>

<div class="map-container">

<svg viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid meet">

    <!-- FIX: proper full-image rendering without cropping -->
    <image href="images/impiltur_map.png"
           x="0" y="0"
           width="1000" height="600"
           preserveAspectRatio="xMidYMid meet" />

    <circle class="region" id="region1" cx="510" cy="525" r="150"
            fill="rgba(0,255,0,0.25)" stroke="green" stroke-width="2" />

</svg>

<div class="popup" id="popup">
    <span class="close-btn" onclick="closePopup()">✖</span>
    <h3 id="popup-title"></h3>
    <p id="popup-text"></p>
</div>

</div>

<script>
const popup = document.getElementById("popup");
const title = document.getElementById("popup-title");
const text = document.getElementById("popup-text");

const regions = {
    region1: {
        name: "Southern Impiltur",
        lore: "Southern Impiltur is situated along the northeastern edge of the Sea of Fallen Stars, commonly referred to as the Easting Coast. Geographically, the area is defined by its shoreline along the Easting Reach, extending inland toward natural boundaries like the Earthfast Mountains and the Gray Forest to the west.",
        url: "world3.html"
    }
};

function showPopup(e, region) {
    title.innerText = region.name;
    text.innerText = region.lore;

    popup.style.display = "block";

    const margin = 12;

    let left = e.clientX + margin;
    let top = e.clientY + margin;

    const rect = popup.getBoundingClientRect();

    if (left + rect.width > window.innerWidth) {
        left = e.clientX - rect.width - margin;
    }

    if (top + rect.height > window.innerHeight) {
        top = e.clientY - rect.height - margin;
    }

    left = Math.max(0, left);
    top = Math.max(0, top);

    popup.style.left = left + "px";
    popup.style.top = top + "px";
}

function closePopup() {
    popup.style.display = "none";
}

Object.keys(regions).forEach(id => {
    const el = document.getElementById(id);
    const region = regions[id];

    if (!el) return;

    el.addEventListener("mousemove", (e) => showPopup(e, region));
    el.addEventListener("mouseleave", closePopup);

    el.addEventListener("click", () => {
        window.location.href = region.url;
    });
});
</script>

<script>
fetch("navbar.html")
  .then(response => response.text())
  .then(data => {
    document.getElementById("navbar").innerHTML = data;
  });
</script>

</body>
</html>
