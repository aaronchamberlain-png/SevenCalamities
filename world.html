<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Interactive Map</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    color: #eee;
    padding-bottom: 50px;
}

header {
    text-align: center;
    padding: 20px;
}

.map-container {
    width: 90%;
    margin: 0 auto 50px auto;
    position: relative;
}

svg {
    width: 100%;
    display: block;
    background: url('images/Faerun_1e.webp');
    background-size: cover;
    border-radius: 12px;
    filter: grayscale(80%) contrast(1.2) brightness(0.95);
}

.region {
    cursor: pointer;
    transition: 0.2s ease-in-out;
    filter: grayscale(30%);
    opacity: 0.75;
}

.region:hover {
    filter: grayscale(0%) brightness(1.2);
    opacity: 1;
    filter: drop-shadow(0 0 10px cyan);
}

.popup {
    position: absolute;
    background: rgba(20,20,20,0.95);
    border: 1px solid #555;
    padding: 12px;
    border-radius: 8px;
    width: 260px;
    display: none;
    pointer-events: none;
    z-index: 1000;
}

.popup h3 {
    margin-top: 0;
}

.close-btn {
    float: right;
    cursor: pointer;
    color: #aaa;
}
</style>
</head>

<body>

<!-- Banner -->
<img src="images/banner.png" alt="The Seven Calamities Banner" class="banner">

<!-- Navigation -->
<div id="navbar"></div>

<header>
    <h1 class="text-center section-title">Interactive Faerûn Map</h1>
</header>

<div class="map-container">

<svg viewBox="0 0 1000 600">
    <circle class="region" id="region1"
        cx="795" cy="275" r="65"
        fill="rgba(255,255,0,0.25)"
        stroke="yellow"
        stroke-width="2" />
</svg>

<div class="popup" id="popup">
    <span class="close-btn" onclick="closePopup()">✖</span>
    <h3 id="popup-title"></h3>
    <p id="popup-text"></p>
</div>

</div>

<script>
const popup = document.getElementById("popup");
const title = document.getElementById("popup-title");
const text = document.getElementById("popup-text");

let activeRegion = null;

const regions = {
    region1: {
        name: "Impiltur",
        lore: "Impiltur is a prosperous, stable, and traditionally 'forgotten' kingdom in northeastern Faerûn, located along the Easting Reach of the Sea of Fallen Stars. It is known for its strong defensive stance, human-dominated cities, and history of trade, acting as a crucial link between dwarven mountain nations and the inland sea.",
        url: "world2.html"
    }
};

function showPopup(e, region) {
    title.innerText = region.name;
    text.innerText = region.lore;

    popup.style.display = "block";

    const margin = 12;

    let left = e.clientX + margin;
    let top = e.clientY + margin;

    const rect = popup.getBoundingClientRect();

    if (left + rect.width > window.innerWidth) {
        left = e.clientX - rect.width - margin;
    }

    if (top + rect.height > window.innerHeight) {
        top = e.clientY - rect.height - margin;
    }

    left = Math.max(10, left);
    top = Math.max(10, top);

    popup.style.left = left + "px";
    popup.style.top = top + "px";
}

function closePopup() {
    popup.style.display = "none";
    activeRegion = null;
}

Object.keys(regions).forEach(id => {

    const el = document.getElementById(id);
    const region = regions[id];

    if (!el) return;

    // Desktop hover
    el.addEventListener("mousemove", (e) => {
        if ('ontouchstart' in window) return;
        showPopup(e, region);
    });

    el.addEventListener("mouseleave", () => {
        if ('ontouchstart' in window) return;
        closePopup();
    });

    // Click / touch behavior
    el.addEventListener("click", (e) => {

        // TOUCH DEVICES: tap-to-preview, second tap to navigate
        if ('ontouchstart' in window) {

            if (activeRegion !== id) {
                e.preventDefault();
                activeRegion = id;
                showPopup(e, region);
                return;
            }

            window.location.href = region.url;
        }

        // DESKTOP: direct navigation
        else {
            window.location.href = region.url;
        }
    });
});

// tap outside closes popup (mobile usability)
document.addEventListener("click", function(e) {
    const clickedRegion = e.target.closest(".region");

    if (!clickedRegion) {
        closePopup();
    }
});
</script>

<script>
fetch("navbar.html")
  .then(response => response.text())
  .then(data => {
    document.getElementById("navbar").innerHTML = data;
  });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
