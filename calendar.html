<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgotten Realms Calendar</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

<style>

/* =========================================
   CALENDAR LAYOUT FIXES
========================================= */

.calendar {
    max-width: 1000px;
    margin: 30px auto;
    padding-bottom: 40px;
}

/* Center navbar correctly on desktop */
.navbar .navbar-nav {
    margin: 0 auto;
}

/* Header */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
}

.month-title {
    color: #ffd700;
    text-align: center;
    margin: 0;
}

/* No horizontal scroll */
.calendar-wrapper {
    width: 100%;
    overflow: hidden;
}

/* TRUE 10-DAY GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 4px;
    margin-top: 15px;
    width: 100%;
}

/* Calendar cells */
.day,
.event-day,
.festival {
    text-align: center;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s ease;

    aspect-ratio: 1 / 1;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    font-size: clamp(0.45rem, 1.8vw, 1rem);
    padding: 2px;
    overflow: hidden;
}

.day {
    background: #1f1f1f;
    border: 1px solid #2f2f2f;
}

.day:hover {
    background: #2a2a2a;
}

.event-day {
    background: #2a3f5f;
    border: 1px solid #5aa9ff;
}

.event-day:hover {
    background: #365a86;
}

.festival {
    background: #5a3d00;
    color: #ffd700;
    font-weight: bold;
    border: 1px solid #8a6400;
    aspect-ratio: auto;
    padding: 10px;
}

/* Moon */
.moon {
    font-size: 0.75em;
    margin-top: 2px;
}

/* Legend */
.legend {
    margin-top: 20px;
    font-size: 0.9em;
    color: #ccc;
}

.legend-box {
    display: inline-block;
    width: 12px;
    height: 12px;
    border-radius: 3px;
    margin-right: 6px;
    vertical-align: middle;
}

.legend-event { background: #2a3f5f; border: 1px solid #5aa9ff; }
.legend-festival { background: #5a3d00; }
.legend-normal { background: #1f1f1f; border: 1px solid #333; }

</style>

</head>

<body>

<!-- Banner -->
<img src="images/banner.png" alt="Banner" class="banner">

<div class="container">

<!-- NAVBAR -->
<div id="navbar"></div>

<div class="calendar">

<!-- HEADER -->
<div class="header mt-4">
  <button onclick="prevMonth()">◀</button>
  <h2 class="month-title" id="monthName"></h2>
  <button onclick="nextMonth()">▶</button>
</div>

<!-- GRID -->
<div class="calendar-wrapper">
  <div class="grid" id="calendarGrid"></div>
</div>

<!-- LEGEND -->
<div class="legend">

  <p><span class="legend-box legend-normal"></span> Normal Day</p>
  <p><span class="legend-box legend-event"></span> Event Day</p>
  <p><span class="legend-box legend-festival"></span> Festival Day</p>

</div>

</div>
</div>

<!-- MODAL -->
<div class="modal fade" id="eventModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content bg-dark text-light">

      <div class="modal-header">
        <h5 class="modal-title" id="modalTitle"></h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body" id="modalBody"></div>

    </div>
  </div>
</div>

<script>

const months = [
  "Hammer","Alturiak","Ches","Tarsakh","Mirtul","Kythorn",
  "Flamerule","Eleasis","Eleint","Marpenoth","Uktar","Nightal"
];

const festivals = {
  0: {
    name: "Midwinter",
    note: "A sacred winter festival of survival, feasts, and renewal rituals."
  },
  2: {
    name: "Greengrass",
    note: "A celebration of renewal where fields are blessed and nature awakens."
  },
  5: {
    name: "Midsummer",
    note: "The peak of magic and warmth, marked by bonfires and revelry."
  },
  7: {
    name: "Highharvestide",
    note: "A harvest festival honoring abundance and trade."
  },
  8: {
    name: "Feast of the Moon",
    note: "A solemn night honoring ancestors and the dead."
  }
};

const events = {
  "Hammer-12": "First signs of a calamity appear. Rumbles.",
  "Hammer-17": "Calamity! - Impilturian Earthquake",
  "Ches-1": "The King's Royal Ball at Castle"
};

let currentMonth = 0;

function getMoonPhase(day) {
  if (day % 30 === 0) return "🌑";
  if (day % 15 === 0) return "🌕";
  if (day % 7 === 0) return "🌓";
  if (day % 22 === 0) return "🌗";
  return "";
}

function openEvent(month, day) {

  const key = month + "-" + day;

  document.getElementById("modalTitle").innerText =
    month + " " + day;

  document.getElementById("modalBody").innerText =
    events[key] || "No events recorded... yet.";

  new bootstrap.Modal(document.getElementById('eventModal')).show();
}

function openFestival(festival) {

  document.getElementById("modalTitle").innerText =
    festival.name;

  document.getElementById("modalBody").innerText =
    festival.note;

  new bootstrap.Modal(document.getElementById('eventModal')).show();
}

function renderCalendar() {

  const grid = document.getElementById("calendarGrid");
  const title = document.getElementById("monthName");

  grid.innerHTML = "";

  const monthName = months[currentMonth];
  title.innerText = monthName;

  for (let i = 1; i <= 30; i++) {

    const key = monthName + "-" + i;
    const hasEvent = events[key];

    const day = document.createElement("div");

    day.className = hasEvent ? "event-day" : "day";

    day.innerHTML =
      i + `<span class='moon'>${getMoonPhase(i)}</span>`;

    day.onclick = () => openEvent(monthName, i);

    grid.appendChild(day);
  }

  if (festivals[currentMonth]) {

    const fest = festivals[currentMonth];

    const festDiv = document.createElement("div");
    festDiv.className = "festival";
    festDiv.style.gridColumn = "span 10";

    festDiv.innerText = fest.name;

    festDiv.onclick = () => openFestival(fest);

    grid.appendChild(festDiv);
  }
}

function nextMonth() {
  currentMonth = (currentMonth + 1) % 12;
  renderCalendar();
}

function prevMonth() {
  currentMonth = (currentMonth - 1 + 12) % 12;
  renderCalendar();
}

renderCalendar();

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
fetch("navbar.html")
  .then(r => r.text())
  .then(data => {
    document.getElementById("navbar").innerHTML = data;
  });
</script>

</body>
</html>
